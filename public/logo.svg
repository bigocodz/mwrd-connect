<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Orange background -->
  <rect width="100" height="100" fill="#FF6347"/>
  <!-- MWRD sparkle / bracket symbol
       Two curved brackets facing each other, forming a 4-pointed diamond star.
       Left bracket < with curved arms, right bracket > with curved arms.
  -->
  <path d="
    M 50 18
    C 46 26, 30 34, 18 50
    C 30 66, 46 74, 50 82
    C 54 74, 70 66, 82 50
    C 70 34, 54 26, 50 18
    Z
  " fill="#FF6347"/>
  <path d="
    M 50 22
    C 42 32, 24 38, 14 50
    C 24 62, 42 68, 50 78
    L 50 68
    C 44 60, 30 55, 24 50
    C 30 45, 44 40, 50 32
    Z
  " fill="#141413"/>
  <path d="
    M 50 22
    C 58 32, 76 38, 86 50
    C 76 62, 58 68, 50 78
    L 50 68
    C 56 60, 70 55, 76 50
    C 70 45, 56 40, 50 32
    Z
  " fill="#141413"/>
  <!-- top spike -->
  <path d="M 44 22 Q 50 12, 56 22 Q 50 28, 44 22 Z" fill="#141413"/>
  <!-- bottom spike -->
  <path d="M 44 78 Q 50 88, 56 78 Q 50 72, 44 78 Z" fill="#141413"/>
</svg>
